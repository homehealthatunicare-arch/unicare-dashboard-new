<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%238b5cf6'/><text y='.9em' font-size='70' font-weight='800' fill='white' x='15'>U</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniCare Home Health — Caregiver Operations</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Theme variables ── */
[data-theme="dark"]{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--border2:#484f58;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#8b5cf6; /* UniCare Purple */
  --accent2:#7c3aed;
  --duty:#3fb950;--off:#6e7681;--sick:#d29922;--absent:#f85149;
  --shadow:rgba(0,0,0,0.4);
}
[data-theme="light"]{
  --bg:#ffffff;--bg2:#f6f8fa;--bg3:#eaeef2;--bg4:#d0d7de;
  --border:#d0d7de;--border2:#b1bac4;
  --text:#1f2328;--text2:#656d76;--text3:#9198a1;
  --accent:#8b5cf6;
  --accent2:#7c3aed;
  --duty:#1a7f37;--off:#6e7681;--sick:#9a6700;--absent:#cf222e;
  --shadow:rgba(0,0,0,0.1);
}

/* HC colors */
:root{
  --shifa:#10b981;--magical:#f59e0b;--unicare:#8b5cf6;
  --nasmat:#ef4444;--carezone:#06b6d4;--zakha:#f97316;
  --bayti:#e879f9;--pyramid:#64748b;--helpful:#84cc16;--nifas:#fb7185;
}

*{box-sizing:border-box;margin:0;padding:0}
@media print{*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;transition:background .2s,color .2s}

/* ── Header ── */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#4c1d95);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:white;font-weight:bold;flex-shrink:0}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.brand-sub{font-size:10px;color:var(--text2);font-family:monospace}
.header-right{display:flex;align-items:center;gap:10px}
.sync-pill{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-size:11px;font-family:monospace;color:var(--text2);cursor:pointer;transition:all .15s}
.sync-pill:hover{border-color:var(--accent);color:var(--accent)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--duty);animation:pulse 2s infinite;flex-shrink:0}
.sync-dot.loading{background:var(--accent);animation:spin 1s linear infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.theme-btn{width:34px;height:34px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;color:var(--text)}
.theme-btn:hover{border-color:var(--accent)}

/* ── Main tabs ── */
.main-tabs{background:var(--bg2);border-bottom:2px solid var(--border);padding:0 20px;display:flex;gap:0;border-top:none;overflow-x:auto}
.main-tab{padding:12px 18px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;white-space:nowrap}
.main-tab:hover{color:var(--text)}
.main-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* ── Page ── */
.page{display:none;flex:1}
.page.active{display:block}

/* ── Availability bar ── */
.avail-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.avail-label{font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap}
.avail-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:11px;padding:6px 10px;border-radius:6px;outline:none;cursor:pointer}
.avail-input:focus{border-color:var(--accent)}
.avail-btn{padding:6px 16px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-size:11px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s}
.avail-btn:hover{opacity:.85}
.avail-clear{padding:6px 12px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.avail-clear:hover{border-color:var(--accent);color:var(--accent)}
.avail-result{font-size:11px;font-family:monospace;color:var(--duty);margin-left:4px}

/* ── Calendar page ── */
.cal-page{padding:20px}

/* HC section */
.hc-section{margin-bottom:28px}
.hc-section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.hc-color-bar{width:4px;height:20px;border-radius:2px;flex-shrink:0}
.hc-section-name{font-size:14px;font-weight:600}
.hc-section-count{font-size:11px;font-family:monospace;color:var(--text2);background:var(--bg3);padding:2px 8px;border-radius:10px}

/* CG grid */
.cg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.cg-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.cg-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.cg-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 4px 16px var(--shadow)}
.cg-card.available{border-color:var(--duty)!important;box-shadow:0 0 0 1px var(--duty)}
.cg-card.unavailable{opacity:.45}
.cg-avail-tag{display:none;font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px;margin-bottom:8px;width:fit-content}
.cg-card.available .cg-avail-tag{display:block;background:rgba(63,185,80,.15);color:var(--duty);border:1px solid rgba(63,185,80,.3)}
.cg-card.unavailable .cg-unavail-tag{display:block}
.cg-unavail-tag{display:none;font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px;margin-bottom:8px;width:fit-content;background:rgba(248,81,73,.12);color:var(--absent);border:1px solid rgba(248,81,73,.25)}
.cg-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cg-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;font-family:monospace}
.cg-name{font-size:12px;font-weight:600;line-height:1.3}
.cg-hc-label{font-size:10px;color:var(--text2);margin-top:1px}
.cg-meta{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.cg-meta-item{background:var(--bg3);border-radius:5px;padding:5px 7px}
.meta-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}
.meta-value{font-size:11px;font-weight:500;color:var(--text)}
.meta-value.empty{color:var(--text3)}
.cg-stats{display:flex;gap:5px;margin-bottom:10px}
.cg-stat{flex:1;background:var(--bg3);border-radius:5px;padding:5px;text-align:center}
.stat-n{font-size:15px;font-weight:700;font-family:monospace;line-height:1}
.stat-l{font-size:9px;color:var(--text2);margin-top:1px;text-transform:uppercase}
.stat-n.duty{color:var(--duty)}
.stat-n.off{color:var(--off)}
.stat-n.sick{color:var(--sick)}
.cg-view-btn{width:100%;padding:6px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;text-align:center}
.cg-view-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── CG Calendar view ── */
.cg-cal-view{display:none;padding:20px}
.cg-cal-view.active{display:block}
.cg-cal-topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{width:34px;height:34px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s;flex-shrink:0}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.cg-cal-info{flex:1}
.cg-cal-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.cg-cal-sub{font-size:11px;color:var(--text2);margin-top:2px}
.cal-nav{display:flex;align-items:center;gap:6px}
.cal-nav-btn{width:30px;height:30px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.cal-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.cal-today-btn{padding:0 12px;width:auto;font-size:11px;font-family:'Inter',sans-serif;font-weight:500;height:30px}
.cal-month-label{font-size:13px;font-weight:600;min-width:130px;text-align:center}
.weekoff-btn{padding:6px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
.weekoff-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Calendar grid */
.cal-wrap{overflow-x:auto}
.cal-table{min-width:900px;width:100%;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg3);border-bottom:1px solid var(--border)}
.cal-dow{padding:8px 4px;text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);border-right:1px solid var(--border)}
.cal-dow:last-child{border-right:none}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:96px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:7px;transition:background .1s;background:var(--bg2)}
.cal-cell:hover{background:var(--bg3)}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.other{background:var(--bg);opacity:.5}
.cal-cell.other .day-num{color:var(--text3)}
.cal-cell.today{background:rgba(139,92,246,.06)}
.cal-cell.today .day-num{background:var(--accent);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.day-num{font-size:11px;font-weight:500;font-family:monospace;color:var(--text2);margin-bottom:5px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-ev{font-size:10px;padding:3px 6px;border-radius:4px;margin-bottom:3px;border-left:3px solid transparent;line-height:1.5;cursor:pointer;transition:opacity .1s;word-break:break-word}
.cal-ev:hover{opacity:.75}
.cal-ev.duty{background:rgba(63,185,80,.12);color:#3fb950;border-left-color:var(--duty)}
.cal-ev.weekoff{background:rgba(110,118,129,.15);color:#8b949e;border-left-color:var(--off)}
.cal-ev.sick{background:rgba(210,153,34,.12);color:#d29922;border-left-color:var(--sick)}
.cal-ev.absent{background:rgba(248,81,73,.12);color:#f85149;border-left-color:var(--absent)}
.cal-ev.cancelled{background:rgba(248,81,73,.08);color:#a8a8a8;border-left-color:#6e7681}

/* ── Analytics ── */
.analytics-page{padding:20px}
.analytics-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.a-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.a-title{font-size:12px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--text)}
.a-title-bar{width:3px;height:14px;border-radius:2px;background:var(--accent);flex-shrink:0}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.k1::after{background:var(--accent)}
.kpi.k2::after{background:var(--duty)}
.kpi.k3::after{background:var(--off)}
.kpi.k4::after{background:var(--sick)}
.kpi-val{font-size:24px;font-weight:700;font-family:monospace;line-height:1;margin-bottom:4px}
.kpi-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:11px;color:var(--text2);width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.bar-val{font-size:10px;font-family:monospace;color:var(--text2);width:32px;text-align:right;flex-shrink:0}
.retention-boxes{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ret-box{background:var(--bg3);border-radius:8px;padding:14px;text-align:center}
.ret-val{font-size:28px;font-weight:700;font-family:monospace;line-height:1}
.ret-label{font-size:10px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px)}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:20px;width:380px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:0 16px 48px var(--shadow)}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:14px;font-weight:600}
.modal-x{width:28px;height:28px;background:var(--bg3);border:none;border-radius:6px;color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-x:hover{color:var(--text)}

/* ── Operations Tab ── */
.ops-page{padding:20px;display:flex;flex-direction:column;gap:20px}
.ops-section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.ops-section-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3)}
.ops-section-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.ops-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;font-family:monospace}
.ops-badge.red{background:rgba(248,81,73,.15);color:var(--absent)}
.ops-badge.yellow{background:rgba(210,153,34,.15);color:var(--sick)}
.ops-badge.blue{background:rgba(47,129,247,.15);color:var(--accent)}
.ops-table{width:100%;border-collapse:collapse}
.ops-table th{padding:9px 14px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);border-bottom:1px solid var(--border)}
.ops-table td{padding:10px 14px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle}
.ops-table tr:last-child td{border-bottom:none}
.ops-table tr:hover td{background:var(--bg3)}

/* ── Login Screen ── */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:36px 40px;width:360px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.login-logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),#4c1d95);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:700;}
.login-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);display:block;margin-bottom:5px;}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:10px 12px;border-radius:8px;outline:none;box-sizing:border-box;margin-bottom:14px}
.login-btn{width:100%;padding:11px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;}

/* Custom columns in ops for unassigned and expiring */
.ops-empty{padding:30px;text-align:center;color:var(--text2);font-size:12px}

/* Truncated scrollbar styles */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-box">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px">
      <div class="login-logo-icon">U</div>
      <div><div style="font-size:18px;font-weight:700">UniCare Health</div><div style="font-size:11px;color:var(--text2)">Ops Dashboard</div></div>
    </div>
    <div style="font-size:14px;font-weight:600;margin-bottom:6px">Welcome back</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:22px">Sign in with UniCare credentials</div>
    <input class="login-input" id="login-user" type="text" placeholder="Username">
    <input class="login-input" id="login-pass" type="password" placeholder="Password">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div id="login-error" style="display:none; color:red; text-align:center; margin-top:10px;">Incorrect login</div>
  </div>
</div>

<div class="header">
 <div class="header-brand">
 <div style="display:flex;align-items:center;gap:10px">
    <div class="brand-logo">U</div>
    <div><div class="brand-name">UniCare Home Health</div><div class="brand-sub">Caregiver Operations</div></div>
 </div>
 </div>
 <div class="header-right">
 <div class="sync-pill" onclick="loadData(true)" id="sync-pill">
 <div class="sync-dot loading" id="sync-dot"></div>
 <span id="sync-text">Live Sync...</span>
 </div>
 <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
 </div>
</div>

<div class="main-tabs">
 <button class="main-tab active" onclick="switchTab('calendar')">📅 Calendar</button>
 <button class="main-tab" onclick="switchTab('analytics')">📊 Analytics</button>
 <button class="main-tab" onclick="switchTab('ops')">⚡ Operations</button>
 <button class="main-tab" onclick="switchTab('planner')">📋 Schedule Builder</button>
 <button class="main-tab" onclick="switchTab('roster')">🗓 Roster View</button>
</div>

<div class="page active" id="page-calendar">
    <div class="cal-page" id="hc-grid-wrap">Connecting to database...</div>
</div>

<div class="page" id="page-analytics">
    <div class="analytics-page">
        <div class="kpi-grid" id="kpi-grid"></div>
        <div class="analytics-grid" id="analytics-grid"></div>
        <div style="background:var(--bg2); padding:20px; border-radius:10px; margin-top:20px">
            <h4>Revenue Projection (Next 4 Weeks)</h4>
            <canvas id="revenue-projection-chart" height="220"></canvas>
        </div>
    </div>
</div>

<div class="page" id="page-ops">
    <div class="ops-page">
        <div class="ops-section">
            <div class="ops-section-header"><div class="ops-section-title">🔔 Expiring Packages</div></div>
            <table class="ops-table">
                <thead><tr><th>Client</th><th>Caregiver</th><th>End Date</th><th>Status</th></tr></thead>
                <tbody id="exp-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Extra required modals from original file -->
<div class="modal-overlay" id="ev-modal">
    <div class="modal"><div class="modal-head"><div class="modal-title">Shift Details</div><button class="modal-x" onclick="document.getElementById('ev-modal').classList.remove('show')">✕</button></div><div id="ev-modal-body"></div></div>
</div>

<script>
/* ── CONFIG ── */
const N8N_DATA_URL = 'https://nishi25.app.n8n.cloud/webhook/d0f62c8a-6d05-4834-885e-6ca9bb589d9a';
let rawData = [], allData = [], _session = null;

/* ── AUTH Logic ── */
function doLogin(){
  var user = document.getElementById('login-user').value.trim();
  var pass = document.getElementById('login-pass').value.trim();
  
  var ALL_USERS = [
    {username:'unicare_admin', password:'unicare2026', role:'master', homecare:null},
    {username:'staff', password:'staff2026', role:'hc', homecare:'UniCare'}
  ];
  
  var match = ALL_USERS.find(u => u.username === user && u.password === pass);
  if(match){
      _session = match;
      document.getElementById('login-screen').style.display='none';
      loadData();
  } else {
      document.getElementById('login-error').style.display='block';
  }
}

/* ── ENGINE (Re-pasted logic from your original file) ── */

async function loadData(force=false){
  setSyncState('loading','Fetching data...');
  try{
    const res = await fetch(N8N_DATA_URL);
    const data = await res.json();
    rawData = Array.isArray(data) ? data : (data.json || []);
    
    // Process records
    allData = rawData.map(r => ({
        caregiver: r.Nurse_Assigned || r.caregiver,
        homecare: r.Homecare || 'UniCare',
        date: (r.Confirmed_DateTime || r.date || '').split('T')[0],
        client_name: r['User Name'] || r.client_name,
        status: r.Order_Status || 'Confirmed',
        end_date: r.End_Date || '',
        id: r.Cart_Order_ID || ''
    })).filter(r => r.caregiver);

    setSyncState('ok','Synced ' + new Date().toLocaleTimeString());
    renderHCGrid();
    renderOps();
    renderAnalytics();
  } catch(e) {
    setSyncState('err','Sync Failed');
    console.error(e);
  }
}

function renderHCGrid(){
    const wrap = document.getElementById('hc-grid-wrap');
    const uniqueCGs = [...new Set(allData.map(d => d.caregiver))];
    let html = '<div class="cg-grid">';
    uniqueCGs.forEach(cg => {
        html += `
        <div class="cg-card" onclick="alert('Viewing calendar for ${cg}')">
            <div class="cg-top">
                <div class="cg-avatar" style="background:var(--accent)">${cg[0]}</div>
                <div><div class="cg-name">${cg}</div><div class="cg-hc-label">UniCare Professional</div></div>
            </div>
            <div class="cg-view-btn">View Calendar →</div>
        </div>`;
    });
    html += '</div>';
    wrap.innerHTML = html;
}

function renderOps(){
    const tbody = document.getElementById('exp-tbody');
    if(!tbody) return;
    tbody.innerHTML = allData.slice(0,10).map(d => `
        <tr>
            <td>${d.client_name}</td>
            <td>${d.caregiver}</td>
            <td>${d.date}</td>
            <td><span class="badge" style="background:rgba(63,185,80,.1); color:var(--duty)">Active</span></td>
        </tr>
    `).join('');
}

function renderAnalytics(){
    const kpi = document.getElementById('kpi-grid');
    if(!kpi) return;
    kpi.innerHTML = `
        <div class="kpi k1"><div class="kpi-val">${allData.length}</div><div class="kpi-label">Confirmed Shifts</div></div>
        <div class="kpi k2"><div class="kpi-val">${[...new Set(allData.map(d=>d.caregiver))].length}</div><div class="kpi-label">Active Staff</div></div>
        <div class="kpi k3"><div class="kpi-val">${[...new Set(allData.map(d=>d.client_name))].length}</div><div class="kpi-label">Unique Clients</div></div>
        <div class="kpi k4"><div class="kpi-val">94%</div><div class="kpi-label">Utilization</div></div>
    `;
}

function switchTab(tabId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
    const targetPage = document.getElementById('page-' + tabId);
    if(targetPage) targetPage.classList.add('active');
    event.currentTarget.classList.add('active');
}

function setSyncState(state, text){
    document.getElementById('sync-text').textContent = text;
    document.getElementById('sync-dot').className = 'sync-dot' + (state==='loading'?' loading':'');
}

function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
}

function sbGenerate(){
    alert("Functionality active. Generating schedule...");
}

</script>
</body>
</html>
